services:
  - type: web
    name: checklist-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --chdir backend wsgi:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: TOKEN_MAX_AGE_SECONDS
        value: 28800
      - key: STORAGE_BACKEND
        value: supabase
      - key: SUPABASE_STORAGE_BUCKET
        value: evidencias
      - key: FREE_DB_LIMIT_MB
        value: 500
      - key: FREE_STORAGE_LIMIT_MB
        value: 1024
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

  - type: static
    name: checklist-web
    buildCommand: ""
    staticPublishPath: web_app
