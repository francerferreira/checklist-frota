name: Keep Render Awake

on:
  schedule:
    - cron: "*/7 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        env:
          TARGET_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
          DEFAULT_URL: https://checklist-frota-qngw.onrender.com/health
        run: |
          URL="${TARGET_URL:-$DEFAULT_URL}"
          echo "Pinging: $URL"
          curl -fsS --max-time 20 --retry 2 --retry-delay 2 "$URL" >/dev/null
          echo "Ping OK"
